<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Focus check — Focus Intent</title>
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <div class="blocked-page">
      <div class="blocked-card card">
        <p class="stage-badge muted" id="stage-badge">Focus check</p>
        <h1 id="headline">Remember your task:</h1>

        <div class="task-strip">
          <p class="task-title" id="task-title">—</p>
        </div>

        <div class="timer-block">
          <p class="session-remaining" id="session-remaining">24:00</p>
          <p class="timer-label muted" id="session-sub">time remaining</p>
          <div class="time-bar" aria-hidden="true">
            <span class="time-bar-fill" id="time-bar-fill"></span>
          </div>
        </div>

        <div class="pause-overlay" id="pause-overlay" hidden>
          <p class="pause-count" id="pause-count">3</p>
          <p class="muted">Take one breath before deciding.</p>
        </div>

        <p class="grounding muted" id="grounding"></p>
        <p class="lead muted" id="site-line"></p>

        <div class="stage-body" id="stage-body">
          <div id="controls-1" class="controls" hidden>
            <button type="button" class="btn btn-primary" id="btn-work-1">Return to Work</button>
            <button type="button" class="btn btn-ghost" id="btn-open-1" disabled>Continue</button>
          </div>

          <div id="controls-2" class="controls" hidden>
            <label class="check-row strong-check">
              <input type="checkbox" id="ack-2" />
              <span>I’m choosing to leave my focus session’s intention right now.</span>
            </label>
            <button type="button" class="btn btn-primary" id="btn-work-2">Return to Work</button>
            <button type="button" class="btn btn-ghost" id="btn-open-2" disabled>Continue Anyway</button>
          </div>

          <div id="controls-3" class="controls" hidden>
            <div class="unlock-timer muted" id="unlock-wait">Unlock available in 45s</div>
            <div class="stage-3-actions">
              <button type="button" class="btn btn-primary" id="btn-work-3">Return to Work</button>
              <button type="button" class="btn btn-ghost" id="btn-open-3" disabled>2 Min Unlock</button>
            </div>
          </div>
        </div>

        <div class="recovery-row" id="recovery-row" hidden>
          <button type="button" class="btn btn-ghost recovery-btn" id="btn-allow-session" hidden>
            Allow this site for this session
          </button>
          <button type="button" class="btn btn-ghost recovery-btn" id="btn-recover">Return to last work page</button>
        </div>

        <p class="muted footer-note">Need to unblock permanently? Go to Settings -> Blocked Sites</p>
      </div>
    </div>
    <script type="module" src="blocked.js"></script>
  </body>
</html>
