<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Focus Intent</title>
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-root">
      <header class="popup-header">
        <div class="brand-wrap">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1 class="popup-title">Focus</h1>
            <p class="popup-tagline muted">Stay intentional.</p>
          </div>
        </div>
        <button type="button" class="btn btn-ghost icon-btn" id="open-settings" title="Settings" aria-label="Open settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
            />
          </svg>
        </button>
      </header>

      <div class="nav-chips" aria-hidden="true">
        <span class="chip active">Session</span>
        <span class="chip">Sites</span>
        <span class="chip">Settings</span>
      </div>

      <section class="card session-card" id="active-panel" hidden>
        <div class="session-head">
          <h2 class="session-title">Focus</h2>
          <div class="session-state">
            <span class="state-dot" id="session-state-dot" aria-hidden="true"></span>
            <span class="session-state-text" id="session-badge">Active</span>
          </div>
        </div>

        <div class="session-ring-wrap">
          <svg class="session-ring" viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ring-track" cx="60" cy="60" r="52"></circle>
            <circle class="ring-progress" id="time-progress-ring" cx="60" cy="60" r="52"></circle>
          </svg>
          <div class="session-ring-center">
            <p class="session-time" id="time-remaining">—</p>
            <p class="task-name" id="current-task">—</p>
          </div>
        </div>

        <button type="button" class="btn btn-ghost session-status-btn" id="toggle-pause">Session running</button>
        <button type="button" class="btn btn-primary session-end-btn" id="end-session">End session</button>
        <p class="muted session-meta" id="session-meta"></p>
      </section>

      <section class="card start-card" id="start-panel">
        <span class="field-label">What are you doing?</span>
        <select id="task-type"></select>

        <label class="field-label" for="task-label" style="margin-top: 0.75rem">Task name</label>
        <input type="text" id="task-label" placeholder="e.g. Finish chapter 4" maxlength="120" />

        <label class="field-label" for="duration" style="margin-top: 0.75rem">Duration (minutes)</label>
        <input type="number" id="duration" min="5" max="480" step="5" value="25" />

        <label class="field-label" for="allowlist" style="margin-top: 0.75rem">Allow during session (optional)</label>
        <textarea id="allowlist" placeholder="One domain per line, e.g.&#10;docs.google.com&#10;github.com"></textarea>
        <p class="muted allow-hint">These sites skip friction while your session runs.</p>

        <button type="button" class="btn btn-primary start-btn" id="start-session">Start focus session</button>
        <p class="muted disabled-hint" id="disabled-hint" hidden>Extension is off in settings. Turn it on to run sessions.</p>
      </section>

      <footer class="popup-footer muted">
        <span id="streak-line"></span>
        <p class="privacy-note">No account. No cloud. Data stays in your browser.</p>
      </footer>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
